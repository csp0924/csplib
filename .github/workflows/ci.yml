# ======================================================================
# GitHub Actions: CI (PR gating + main lint smoke)
#
# 目的：PR 階段做完整 gating（lint + 3 OS test + build-check），
#       push main 後只做精簡 lint（防 squash race / parallel merge 後格式漂移）。
#       發版由 release.yml 處理（tag 觸發），它會在 PyPI publish 前再跑一次 3 OS test。
#
# 觸發策略：
#   - PR                      → lint + 3 OS test + build-check（gating，必須）
#   - push main（squash merge / Release PR merge / hotfix）→ lint only（~30s）
#   - 手動觸發（workflow_dispatch）→ 完整流程（同 PR）
#
# 為何 push main 不重跑 test/build：
#   - PR up-to-date 才能 merge，PR CI 跑的就是合進 main 後的內容
#   - Release PR 只改 CHANGELOG/__version__，無 source 變動
#   - 真正的 release safety net 在 release.yml 的 test job（publish 前）
#   - 省下 macOS+win+ubuntu test ~6 分鐘 / 每次 push main
#
# 注意事項：
#   - branch protection required status check 仍以 PR 階段的綠燈為準
#   - test/build-check job 在 push main 時會被 skip（顯示為 skipped status）
#   - lint 在 main 跑很便宜，且能擋 parallel merge 後的格式衝突
# ======================================================================

name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # ============ Lint (並行) ============
  # job name 保持 "Lint" 以對上 branch protection 的 required status check
  # (舊 build-wheels.yml 遺留；mypy 也放在此 job 內一起跑)
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v7.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Restore tool caches
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            .ruff_cache
            .mypy_cache
          key: ${{ runner.os }}-lint-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-lint-

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: mypy
        run: uv run mypy csp_lib/

  # ============ Test (並行，3 OS matrix) ============
  # 只在 PR / 手動觸發時跑（PR gating + 跨平台回歸）。
  # push main 不跑：PR up-to-date 已驗證；release safety net 在 release.yml。
  test:
    name: Test on ${{ matrix.os }}
    if: github.event_name != 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v7.0.0
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Restore pytest cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .pytest_cache
          key: ${{ runner.os }}-pytest-${{ hashFiles('pyproject.toml', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-pytest-

      - name: Install dependencies
        run: uv sync --group dev --all-extras

      - name: Run tests with coverage
        # 用 `uv run python -m pytest` 確保 Windows 中文路徑 /  PATH 一致性
        run: uv run python -m pytest tests/ -v -n auto --cov=csp_lib --cov-report=xml --cov-report=term

      - name: Coverage threshold
        if: matrix.os == 'ubuntu-latest'
        run: uv run coverage report --fail-under=80

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: coverage-report
          path: coverage.xml

  # ============ Build Check (PR / 手動觸發，不發佈) ============
  # 只在 PR / 手動觸發時跑；push main 後 release.yml 會在 publish 前再 build 一次。
  build-check:
    name: Build Check
    if: github.event_name != 'push'
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: |
          pip install build twine
          python -m build
          twine check dist/*

      - name: Verify pure-Python wheel
        run: |
          WHL=$(ls dist/*.whl)
          if [[ "$WHL" != *"py3-none-any"* ]]; then
            echo "::error::Wheel is not pure Python: $WHL"
            exit 1
          fi

      - name: Install wheel with [all] extras
        run: |
          WHL=$(ls dist/*.whl)
          pip install "${WHL}[all]"

      - name: Verify import
        run: |
          python -c "import csp_lib; print(f'csp_lib {csp_lib.__version__} imported successfully')"

      # Upload artifact 讓 release.new.yml 可以 reuse（tag workflow 不用重跑 build）
      - name: Upload dist artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
