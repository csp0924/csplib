# GitHub Actions: CI (legacy — idle)
#
# 歷史用途：手動發版時代的單一 CI + publish workflow。
#
# 現況（release-please 遷移中）：
#   - CI / lint / test / build 由 ci.new.yml 接手（2 OS matrix + build-check）
#   - Publish 由 release.new.yml 接手（tag 觸發 + OIDC trusted publishing）
#   - 本檔 trigger 收束為 workflow_dispatch only，保留 job 定義作為緊急 manual fallback
#     （例如新 workflow 壞掉時手動觸發單一 workflow 完成發版）
#
# Phase 3 切換完成後計畫整檔刪除。

name: CI (legacy)

on:
  workflow_dispatch:

jobs:
  # ============ Lint (PR + Tag 都會跑) ============
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run Ruff (lint)
        run: uv run ruff check .

      - name: Run Ruff (format check)
        run: uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy csp_lib/

  # ============ Changelog Check (PR only) ============
  changelog-check:
    name: Changelog Check
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check CHANGELOG updated
        if: "!contains(github.event.pull_request.labels.*.name, 'skip-changelog')"
        run: |
          if git diff --name-only origin/main...HEAD | grep -q '^CHANGELOG.md$'; then
            echo "CHANGELOG.md was updated."
          else
            echo "::error::CHANGELOG.md was not modified. Add 'skip-changelog' label to bypass."
            exit 1
          fi

  # ============ 測試 (PR + Tag 都會跑) ============
  test:
    name: Test on ${{ matrix.os }}
    needs: [lint]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev --all-extras

      - name: Run tests with coverage
        run: uv run pytest tests/ -v -n auto --cov=csp_lib --cov-report=xml --cov-report=term

      - name: Check coverage threshold
        if: matrix.os == 'ubuntu-latest'
        run: uv run coverage report --fail-under=80

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: coverage-report
          path: coverage.xml

  # ============ Build 驗證 (PR + Tag 都會跑) ============
  build:
    name: Build Check
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: |
          pip install build twine
          python -m build
          twine check dist/*

      - name: Verify wheel tag
        run: |
          WHL=$(ls dist/*.whl)
          if [[ "$WHL" != *"py3-none-any"* ]]; then
            echo "::error::Wheel is not pure Python: $WHL"
            exit 1
          fi

      - name: Install wheel with all extras
        run: |
          WHL=$(ls dist/*.whl)
          pip install "${WHL}[all]"

      - name: Verify import
        run: |
          python -c "import csp_lib; print(f'csp_lib {csp_lib.__version__} imported successfully')"

  # ============ 發布 (只有 Tag) ============
  publish:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Verify tag matches __version__
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python3 -c "
          import re
          m = re.search(r'__version__\s*=\s*\"([^\"]+)\"', open('csp_lib/__init__.py').read())
          print(m.group(1))
          ")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match __version__=$PKG_VERSION"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          python3 -c "
          import re, os
          version = '${TAG_VERSION}'
          content = open('CHANGELOG.md', encoding='utf-8').read()
          pattern = rf'## \[{re.escape(version)}\].*?\n(.*?)(?=\n## \[|\Z)'
          m = re.search(pattern, content, re.DOTALL)
          notes = m.group(1).strip() if m else f'Release {version}'
          open('release_notes.md', 'w', encoding='utf-8').write(notes)
          "

      - name: Build sdist and wheel
        run: |
          pip install build twine
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          attestations: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          body_path: release_notes.md
