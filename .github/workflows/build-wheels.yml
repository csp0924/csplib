# GitHub Actions: Build Cython Wheels
#
# 跨平台建置 csp_lib 二進位 wheel
# 支援: Windows, Ubuntu, Rocky Linux (透過 manylinux)
#
# 觸發策略 (節省額度):
#   - PR: 只跑測試 (不建置 wheel)
#   - Tag (v*): 測試 + 建置 + 發布
#   - 手動觸發: 完整流程

name: Build Wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  # ============ Lint (PR + Tag 都會跑) ============
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev
        env:
          SKIP_CYTHON: "1"

      - name: Run Ruff (lint)
        run: uv run ruff check .

      - name: Run Ruff (format check)
        run: uv run ruff format --check .

  # ============ 測試 (PR + Tag 都會跑) ============
  test:
    name: Test on ${{ matrix.os }}
    needs: [lint]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev --all-extras
        env:
          SKIP_CYTHON: "1"

      - name: Run tests with coverage
        run: uv run pytest tests/ -v --cov=csp_lib --cov-report=xml

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ============ 建置 Windows Wheel ============
  build_wheels:
    name: Build wheel on Windows
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cython build wheel setuptools mypy

      - name: Build wheel
        run: python build_wheel.py

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-windows
          path: dist/*.whl

  build_manylinux:
    name: Build manylinux wheel
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cython build wheel setuptools mypy auditwheel patchelf

      - name: Build wheel
        run: python build_wheel.py

      - name: Convert to manylinux
        run: |
          # 使用 auditwheel 將 linux_x86_64 轉換為 manylinux
          # manylinux_2_28 要求 glibc 2.28+，適用於 Python 3.13+ 的目標環境
          auditwheel repair dist/*.whl -w wheelhouse --plat manylinux_2_28_x86_64 --only-plat
          # 移除原始的 linux_x86_64 wheel
          rm dist/*.whl
          # 移動 manylinux wheel 到 dist
          mv wheelhouse/*.whl dist/

      - name: Upload manylinux wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-manylinux
          path: dist/*.whl

  # ============ 發布 (只有 Tag) ============
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_manylinux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write  # 需要寫入權限來上傳 Release assets
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: wheel-*
          merge-multiple: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Verify wheels
        run: |
          pip install twine
          twine check dist/*.whl

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          attestations: true

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
