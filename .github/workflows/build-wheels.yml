# GitHub Actions: Build Cython Wheels
#
# 跨平台建置 csp_lib 二進位 wheel
# 支援: Windows, Ubuntu, Rocky Linux (透過 manylinux)
#
# 觸發條件:
#   - 手動觸發 (workflow_dispatch)
#   - 推送 tag (v*)
#   - 推送到 main 分支

name: Build Wheels

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  build_wheels:
    name: Build wheel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cython build wheel setuptools

      - name: Build wheel
        run: python build_wheel.py

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python-version }}
          path: dist/*.whl

  # 使用 manylinux 建置 Linux 通用 wheel
  build_manylinux:
    name: Build manylinux wheel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build manylinux wheel
        uses: pypa/cibuildwheel@v2.22.0
        env:
          CIBW_BUILD: "cp313-manylinux_x86_64"
          CIBW_BEFORE_BUILD: "pip install cython"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

      - name: Upload manylinux wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-manylinux
          path: wheelhouse/*.whl

  # 測試源碼 (在建置 wheel 前)
  test_source:
    name: Test source on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e .
          pip install pytest pytest-asyncio

      - name: Run tests
        run: pytest tests/ -v

  # 發布到 PyPI (僅在 tag 推送時)
  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_manylinux, test_source]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: wheel-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # 需要在 GitHub Secrets 設定 PYPI_API_TOKEN
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
