# ======================================================================
# GitHub Actions: commitlint
#
# 目的：CI 層強制 conventional commit 格式（不只靠 pre-commit hook）。
#       release-please 依 commit type 決定版本 bump，格式錯就會漏版本或
#       跑出怪 CHANGELOG section。此 workflow 是最後一道防線。
#
# 觸發策略：
#   - PR：檢查 PR 內所有 commit 的 message
#   - push main：檢查最後一個 commit（squash merge 後的 commit message）
#
# 規則：沿用 scripts/check_commit_msg.new.py（含 scope 白名單）
# ======================================================================

name: commitlint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint-commits:
    name: Lint commit messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.13"

      - name: Skip if PR author is a bot
        id: bot-check
        if: github.event_name == 'pull_request'
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          if [ "$AUTHOR" = "dependabot[bot]" ] || [ "$AUTHOR" = "release-please[bot]" ]; then
            echo "PR author '$AUTHOR' is a bot — skipping commitlint"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine commit range
        id: range
        if: steps.bot-check.outputs.skip != 'true'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            echo "range=$BASE..$HEAD" >> "$GITHUB_OUTPUT"
          else
            # push main — 只檢查最新 commit（通常是 squash）
            echo "range=HEAD~1..HEAD" >> "$GITHUB_OUTPUT"
          fi

      - name: Lint each commit
        if: steps.bot-check.outputs.skip != 'true'
        run: |
          set -e
          FAIL=0
          for sha in $(git rev-list --no-merges ${{ steps.range.outputs.range }}); do
            MSG=$(git log --format=%B -n 1 "$sha")
            AUTHOR_EMAIL=$(git log --format=%ae -n 1 "$sha")
            # release-please bot commit / backup tag commit 自動放行
            if echo "$MSG" | head -n1 | grep -qE '^chore: release'; then
              echo "[skip] $sha release-please bot commit"
              continue
            fi
            # dependabot 個別 commit 層級放行（push main 掃 HEAD~1 時也能放行 squash 進來的）
            if echo "$AUTHOR_EMAIL" | grep -qE '(dependabot|release-please)\[bot\]@'; then
              echo "[skip] $sha bot commit ($AUTHOR_EMAIL)"
              continue
            fi
            TMP=$(mktemp)
            echo "$MSG" > "$TMP"
            echo "--- Checking $sha ---"
            if ! python3 scripts/check_commit_msg.py "$TMP"; then
              FAIL=1
            fi
            rm -f "$TMP"
          done
          if [ $FAIL -ne 0 ]; then
            echo "::error::One or more commit messages failed lint"
            echo ""
            echo "請使用 conventional commit 格式：<type>(<scope>): <description>"
            echo "允許的 type: feat/fix/docs/style/refactor/test/ci/chore/perf/build/revert"
            echo "scope 必須為模組名（如 controller, equipment），禁用版號 scope（如 v0.8.0）"
            exit 1
          fi
