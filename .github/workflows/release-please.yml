# ======================================================================
# GitHub Actions: release-please
#
# 目的：掃 main 上的 conventional commits，自動維護「Release PR」。
#       當 user merge Release PR 時，release-please 會：
#         1. 合併 commits 到 CHANGELOG.md
#         2. 撞 csp_lib/__init__.py 的 __version__ 到下個版本
#         3. 推 `vX.Y.Z` tag
#       tag 推出後由 release.new.yml 接手（PyPI + GitHub Release）。
#
# 觸發策略：
#   - push main → 重新計算 Release PR 內容
#   - 手動觸發 → 同上（方便第一次 bootstrap）
#
# 相依：release-please-config.json、.release-please-manifest.json
# ======================================================================

name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write       # 需要寫 CHANGELOG、__init__.py、推 tag
  pull-requests: write  # 需要開/更新 Release PR
  issues: write         # 需要標 label（release-please 會標 `autorelease: pending`）

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Run release-please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - name: release-please
        id: rp
        uses: googleapis/release-please-action@a02a34c4d625f9be7cb89156071d8567266a2445  # v4.1.3
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # 預設 token 即 GITHUB_TOKEN，足以在同 repo 開 PR
          token: ${{ secrets.GITHUB_TOKEN }}

  # ========== CITATION.cff date-released 後處理 ==========
  # release-please 的 generic updater 只能 bump semver，不能改日期。
  # release-please 自建完 tag 後，這個 job 把 date-released 同步到今天（UTC），
  # 並 push 到 main（HEAD 的「後追」commit）。
  sync-citation-date:
    name: Sync CITATION.cff date-released
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update date-released
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          python3 -c "
          import re, pathlib
          p = pathlib.Path('CITATION.cff')
          s = p.read_text(encoding='utf-8')
          new = re.sub(r'^(date-released:\s*\")[^\"]+(\")', r'\1$TODAY\2', s, count=1, flags=re.MULTILINE)
          p.write_text(new, encoding='utf-8')
          "
          git diff CITATION.cff

      - name: Commit & push if changed
        run: |
          if ! git diff --quiet CITATION.cff; then
            git config user.name "release-please[bot]"
            git config user.email "release-please[bot]@users.noreply.github.com"
            git add CITATION.cff
            git commit -m "chore: sync CITATION.cff date-released to ${{ needs.release-please.outputs.version }} release date"
            git push origin main
          else
            echo "CITATION.cff date-released already up to date"
          fi
