[project]
name = "csp0924_lib"
dynamic = ["version"]
description = "CSP Common Library - 模組化工具集"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "loguru>=0.7.0",
]

[project.optional-dependencies]
mongo = [
    "motor>=3.0.0",
]
redis = [
    "redis>=5.0.0",
]
modbus = [
    "pymodbus>=3.0.0",
]
all = [
    "csp0924_lib[mongo,redis,modbus]",
]

# =============== Build System (Cython Binary Distribution) ===============
[build-system]
requires = ["setuptools>=75.0.0", "wheel", "cython>=3.0.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.dynamic]
version = {attr = "csp_lib.__version__"}

[tool.setuptools]
packages = ["csp_lib"]
include-package-data = false

[tool.setuptools.package-data]
"*" = ["*.pyd", "*.so", "py.typed"]

# =============== Development Dependencies ===============
[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "cython>=3.0.0",
]
